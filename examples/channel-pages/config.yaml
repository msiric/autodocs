relevant_pattern: "*channel-page*"

telemetry:
  enabled: true
  cluster: "teamstelemetry01.eastus2.kusto.windows.net"
  database: "bc3902d8132f43e3ae086a009979fa88"
  queries:
    - name: "Overall reliability"
      description: "Failure rates by Channel Pages scenario in the last 24h"
      query: |
        Scenario_Messaging_View
        | where EventInfo_Time > ago(24h)
        | where Scenario_Name in ("fluid_create_channel_page", "fluid_load_channel_page",
            "fluid_link_channel_page", "fluid_link_loop_from_message_to_channel")
        | where Scenario_Step == "stop"
        | summarize
            Total = count(),
            Failures = countif(Scenario_Status == "failure"),
            Incomplete = countif(Scenario_Status == "incomplete"),
            Success = countif(Scenario_Status == "success"),
            Users = dcount(UserInfo_Id)
            by Scenario_Name
        | extend FailureRate = round(100.0 * Failures / Total, 2)

    - name: "Error breakdown"
      description: "Top errors by count for create and load scenarios"
      query: |
        Scenario_Messaging_View
        | where EventInfo_Time > ago(24h)
        | where Scenario_Name in ("fluid_create_channel_page", "fluid_load_channel_page")
        | where Scenario_Status == "failure"
        | summarize Count = count(), Users = dcount(UserInfo_Id) by Scenario_Name, errors, reason
        | order by Count desc

    - name: "Retry storm detection"
      description: "Count of users with >10 failures (no user IDs — aggregate only)"
      query: |
        Scenario_Messaging_View
        | where EventInfo_Time > ago(24h)
        | where Scenario_Name in ("fluid_create_channel_page", "fluid_load_channel_page")
        | where Scenario_Status == "failure"
        | summarize Failures = count() by UserInfo_Id
        | where Failures > 10
        | summarize RetryStormUsers = count(), MaxFailures = max(Failures)

